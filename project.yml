name: DiskAura
options:
  bundleIdPrefix: com.kristian.diskaura
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

targets:
  DiskAura:
    type: application
    platform: macOS
    sources:
      - path: DiskAura
    dependencies:
      - sdk: IOKit.framework
    settings:
      base:
        PRODUCT_NAME: DiskAura
        PRODUCT_BUNDLE_IDENTIFIER: com.kristian.diskaura
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.0"
        SWIFT_OBJC_BRIDGING_HEADER: DiskAura/DiskAura-Bridging-Header.h
        CLANG_ENABLE_MODULES: YES
        ENABLE_HARDENED_RUNTIME: NO
        CODE_SIGN_STYLE: Manual
        # Ad-hoc local signing ("-"): no named certificate needed, so the project builds for
        # anyone who clones the repo without them having to create a personal cert. Correct for
        # an unsigned, local-only open-source app (Gatekeeper: right-click → Open on first launch).
        CODE_SIGN_IDENTITY: "-"
        INFOPLIST_FILE: DiskAura/Info.plist
        CODE_SIGN_ENTITLEMENTS: DiskAura/DiskAura.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: DiskAura/Info.plist
      properties:
        CFBundleDisplayName: DiskAura
        LSMinimumSystemVersion: "14.0"
        NSHumanReadableCopyright: "Copyright © 2026 Fromcode 119"
        LSApplicationCategoryType: public.app-category.utilities
    entitlements:
      path: DiskAura/DiskAura.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.files.user-selected.read-write: true

  DiskAuraTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: DiskAuraTests
    dependencies:
      - target: DiskAura
    settings:
      base:
        SWIFT_VERSION: "5.0"
        GENERATE_INFOPLIST_FILE: YES
